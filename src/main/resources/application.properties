jwt.public.key=classpath:certs/public.pem
jwt.private.key=classpath:certs/private.pem

spring.application.name=Chamadas

spring.datasource.url=jdbc:mysql://${DB_HOST:db}:3306/chamadas?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=true

backup.execute.path=${BACKUP_PATH:/usr/bin}
backup.storage.location=./backups/
database.name=chamadas
database.host=${DB_HOST:db}

server.port=8443
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=123456
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=minha-api



