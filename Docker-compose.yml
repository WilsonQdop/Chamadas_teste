services:
  db:
    image: mysql:8.0
    container_name: mysql-chamadas
    # Mantemos as flags de estabilidade
    command: --lower_case_table_names=1 --innodb_use_native_aio=0
    environment:
      MYSQL_DATABASE: chamadas
      MYSQL_ROOT_PASSWORD: root
      TZ: America/Sao_Paulo
    volumes:
      - mysql_data:/var/lib/mysql # <--- MUDANÇA AQUI (Volume Nomeado)
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: spring-api-chamadas
    ports:
      - "8443:8443"
    volumes:
      - ./backups:/app/backups
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/chamadas
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - BACKUP_PATH=/usr/bin/
      - DB_NAME=chamadas
      - DB_HOST=db
      - DB_USER=root
      - DB_PASS=root
      - TZ=America/Sao_Paulo
    depends_on:
      db:
        condition: service_healthy

# Definição do volume nomeado (gerenciado pelo Docker)
volumes:
  mysql_data: